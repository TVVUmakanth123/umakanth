<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Card</title>
    <link rel="stylesheet" href="test13.css">
</head>
<body>

<div class="card">
    <div class="profile-img">
        <img src="https://i.pravatar.cc/150?img=12" alt="Profile">
    </div>
    <h2>UMAKANTH</h2>
    <p class="role">Senior Product Designer</p>
    <br><hr>
    <div class="stats">
        <div class="p1">
            <h3>12.5k</h3>
            <p>Followers</p>
        </div>
        <br>
        <div class="p2">
            <h3>843</h3>
            <p>Following</p>
        </div>
        <br>
        <div class="p3">
            <h3>42</h3>
            <p>Projects</p>
        </div>
    </div>
    <br><hr>
    <button>Follow User</button>
</div>
</body>
</html>
