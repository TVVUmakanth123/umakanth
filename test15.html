<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Display Arrangement</title>
    <link rel="stylesheet" href="test15.css">
</head>
<body>
<div class="display">
    <h2>Image Display Arrangement</h2>
    <div class="section">
        <h3>Image as Block (display: block)</h3>
        <p>Each image takes its own line and stacks vertically.</p>
        <div class="block-img">
            <img src="1.jpeg">
            <img src="2.JPEG">
        </div>
    </div>
    <div class="section">
        <h3>Images in Flexbox (display: flex)</h3>
        <p>Images sit in a row and are spaced evenly.</p>
        <div class="flex">
            <img src="cog1.jpeg">
            <img src="cog2.jpeg">
            <img src="cog3.jpeg">
        </div>
    </div>
    <div class="section">
        <h3>Images in Grid (display: grid)</h3>
        <p>Organized into a 3-column structure.</p>
        <div class="grid">
            <img src="cherry.jpeg">
            <img src="test14-image.jpeg">
            <img src="mountain.jpeg">
            <img src="4.jpeg">
            <img src="test14-image.jpeg">
            <img src="mountain.jpeg">
        </div>
    </div>
</div>
</body>
</html>
